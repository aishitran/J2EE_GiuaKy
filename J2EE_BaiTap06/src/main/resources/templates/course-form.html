<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Course</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.form-card{
border-radius:12px;
border:none;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.preview-img{
height:180px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/admin/courses">
Admin Panel
</a>

</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card form-card p-4">

<h3 class="mb-4 text-center">
Add New Course
</h3>

<form th:action="@{/admin/course/save}" method="post" th:object="${course}">

<input type="hidden" th:field="*{id}">

<div class="mb-3">
<label class="form-label">Course Name</label>
<input class="form-control form-control-lg"
th:field="*{name}"
placeholder="Enter course name"
required>
</div>

<div class="mb-3">
<label class="form-label">Image URL</label>
<input class="form-control"
th:field="*{image}"
id="imageInput"
placeholder="Paste image link">
</div>

<div class="mb-3 text-center">
<img id="preview"
class="preview-img w-100"
src="https://via.placeholder.com/400x200"
>
</div>

<div class="mb-3">
<label class="form-label">Credits</label>
<input class="form-control"
type="number"
th:field="*{credits}"
placeholder="Enter credits">
</div>

<div class="mb-4">
<label class="form-label">Lecturer</label>
<input class="form-control"
th:field="*{lecturer}"
placeholder="Enter lecturer name">
</div>

<div class="d-flex justify-content-between">

<a href="/admin/courses"
class="btn btn-secondary">
Cancel
</a>

<button class="btn btn-success px-4">
Save Course
</button>

</div>

</form>

</div>

</div>

</div>

</div>

<script>

document.getElementById("imageInput").addEventListener("input",function(){
document.getElementById("preview").src = this.value;
});

</script>

</body>

</html>
