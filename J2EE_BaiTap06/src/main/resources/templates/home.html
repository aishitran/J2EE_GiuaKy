<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<title>Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.course-card{
    border:none;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.course-card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.course-card img{
    height:180px;
    object-fit:cover;
}

.card-body h5{
    font-weight:600;
}

.course-info{
    font-size:14px;
    color:#6c757d;
}

.search-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.nav-active{
    background:#0d6efd;
    color:white !important;
    border-radius:6px;
    padding:6px 12px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container">

<a class="navbar-brand fw-bold" href="/home">Course System</a>

<div class="navbar-nav me-auto">

<a class="nav-link text-white" href="/home">
Home
</a>

<a class="nav-link text-white"
sec:authorize="hasRole('STUDENT')"
href="/mycourses">
My Courses
</a>

<a class="nav-link text-warning fw-bold"
sec:authorize="hasRole('ADMIN')"
href="/admin/courses">
Admin Panel
</a>

</div>

<div class="d-flex align-items-center">

<!-- nếu chưa login -->
<div sec:authorize="isAnonymous()">
<a class="btn btn-warning" href="/login">
Login
</a>
</div>

<!-- nếu đã login -->
<div sec:authorize="isAuthenticated()" class="d-flex align-items-center text-white">

<span class="me-3">
👤 <strong sec:authentication="name"></strong>
</span>

<span sec:authorize="hasRole('ADMIN')" class="badge bg-danger me-2">
ADMIN
</span>

<span sec:authorize="hasRole('STUDENT')" class="badge bg-primary me-2">
STUDENT
</span>

<form th:action="@{/logout}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}" />

<button class="btn btn-warning btn-sm">
Logout
</button>

</form>

</div>

</div>
</nav>

<div class="container mt-4">

<h2 class="mb-4">Available Courses</h2>

<form action="/home" class="row g-2 mb-4">

<div class="col-md-10">
<input class="form-control" name="keyword" placeholder="Search course..." th:value="${keyword}">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">Search</button>
</div>

</form>

<div class="row">

<div class="col-md-4 mb-4" th:each="c : ${courses}">

<div class="card course-card shadow-sm">

<img th:src="${c.image}" class="card-img-top">

<div class="card-body">

<h5 th:text="${c.name}"></h5>

<div class="course-info mb-2">
👨‍🏫 <span th:text="${c.lecturer}"></span>
</div>

<div class="course-info mb-3">
Credits: <span th:text="${c.credits}"></span>
</div>

<div sec:authorize="hasRole('STUDENT')">

<form th:action="@{/enroll/{id}(id=${c.id})}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}"/>

<button class="btn btn-success w-100">
Enroll Course
</button>

</form>

</div>

</div>

</div>

</div>

</div>

<nav class="mt-3">

<ul class="pagination justify-content-center">

<li class="page-item"
th:each="i : ${#numbers.sequence(0,totalPages-1)}">

<a class="page-link"
th:href="@{/home(page=${i},keyword=${keyword})}"
th:text="${i+1}">
</a>

</li>

</ul>

</nav>

</div>

</body>
</html>
