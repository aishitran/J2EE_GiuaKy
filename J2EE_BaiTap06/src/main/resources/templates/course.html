<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Course Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/home">Admin Panel</a>

</div>
</nav>

<div class="container mt-4">

<h3 class="mb-3">Manage Courses</h3>

<a href="/admin/course/new" class="btn btn-primary mb-3">
Add Course
</a>

<table class="table table-bordered table-hover shadow-sm">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Credits</th>
<th>Lecturer</th>
<th width="160">Action</th>
</tr>

</thead>

<tbody>

<tr th:each="c : ${courses}">

<td th:text="${c.id}"></td>
<td th:text="${c.name}"></td>
<td th:text="${c.credits}"></td>
<td th:text="${c.lecturer}"></td>

<td>

<a class="btn btn-warning btn-sm"
th:href="@{/admin/course/edit/{id}(id=${c.id})}">
Edit
</a>

<a class="btn btn-danger btn-sm"
th:href="@{/admin/course/delete/{id}(id=${c.id})}">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
