<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>My Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/home">Course System</a>

<a class="btn btn-light" href="/home">
Back Home
</a>

</div>
</nav>

<div class="container mt-4">

<h3 class="mb-3">My Registered Courses</h3>

<table class="table table-striped table-bordered shadow-sm">

<thead class="table-dark">

<tr>
<th>Course</th>
<th>Credits</th>
<th>Lecturer</th>
<th>Date</th>
</tr>

</thead>

<tbody>

<tr th:each="e : ${courses}">

<td th:text="${e.course.name}"></td>

<td th:text="${e.course.credits}"></td>

<td th:text="${e.course.lecturer}"></td>

<td th:text="${e.enrollDate}"></td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
